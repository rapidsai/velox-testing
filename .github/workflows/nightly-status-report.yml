name: Nightly Status Report

on:
  schedule:
    - cron: '0 11 * * *'  # daily at 11:00 UTC (after all nightlies finish)
  workflow_dispatch:
    inputs:
      date:
        description: 'Report date (YYYY-MM-DD, default: auto-detect from last nightly run)'
        type: string
        required: false
      skip_rca:
        description: 'Skip upstream RCA search'
        type: boolean
        default: false
  push:

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  REPO: rapidsai/velox-testing
  GH_TOKEN: ${{ github.token }}
  GH_HTTP_TIMEOUT: '120'
  GH_RETRIES: '8'

jobs:
  nightly-status:
    runs-on: linux-amd64-cpu4
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install gh CLI
        run: |
          if command -v gh &>/dev/null; then
            echo "gh already available: $(gh --version | head -1)"
          else
            echo "Installing GitHub CLI to ~/.local..."
            GH_VERSION=$(curl -fsSL https://api.github.com/repos/cli/cli/releases/latest | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'].lstrip('v'))")
            ARCH=$(uname -m); [[ "$ARCH" == "x86_64" ]] && ARCH="amd64"
            mkdir -p "$HOME/.local"
            curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_${ARCH}.tar.gz" \
              | tar xz --strip-components=1 -C "$HOME/.local"
            export PATH="$HOME/.local/bin:$PATH"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            gh --version
          fi

      - name: Install Claude CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          claude --version

      - name: Generate nightly status report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          STATUS_FILE: status.txt
        run: |
          DATE_ARG=""
          if [[ -n "${{ inputs.date }}" ]]; then
            DATE_ARG="--date ${{ inputs.date }}"
          fi
          python3 scripts/nightly_status/check_nightly_status.py ${DATE_ARG}

      - name: Generate upstream RCA report
        if: ${{ inputs.skip_rca != true }}
        run: |
          python3 scripts/nightly_status/search_upstream_issues.py \
            -i status.txt \
            -o rca-report.txt

      - name: Upload reports as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-reports
          path: |
            status.txt
            rca-report.txt

      - name: Prepare Slack payloads
        if: always()
        run: |
          if [[ -f status.txt ]]; then
            python3 scripts/nightly_status/prepare_slack_payload.py --file status.txt --output status-payload.json
          fi
          if [[ -f rca-report.txt ]]; then
            python3 scripts/nightly_status/prepare_slack_payload.py --file rca-report.txt --output rca-payload.json
          fi

      - name: Send nightly status to Slack
        if: ${{ always() && hashFiles('status-payload.json') != '' }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          payload-file-path: status-payload.json
          webhook: ${{ secrets.SLACK_WEBHOOK_NIGHTLY_STATUS_URL }}
          webhook-type: incoming-webhook

      - name: Send RCA report to Slack
        if: ${{ always() && inputs.skip_rca != true && hashFiles('rca-payload.json') != '' }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          payload-file-path: rca-payload.json
          webhook: ${{ secrets.SLACK_WEBHOOK_NIGHTLY_STATUS_URL }}
          webhook-type: incoming-webhook
