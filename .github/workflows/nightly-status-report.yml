name: Nightly Status Report

on:
  schedule:
    - cron: '0 11 * * *'  # daily at 11:00 UTC (after all nightlies finish)
  workflow_dispatch: {}

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  REPO: rapidsai/velox-testing
  GH_TOKEN: ${{ github.token }}
  GH_HTTP_TIMEOUT: '120'
  GH_RETRIES: '8'

jobs:
  nightly-status:
    runs-on: linux-amd64-cpu4
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install gh CLI
        run: |
          if command -v gh &>/dev/null; then
            echo "gh already available: $(gh --version | head -1)"
          else
            echo "Installing GitHub CLI to ~/.local..."
            GH_VERSION=$(curl -fsSL https://api.github.com/repos/cli/cli/releases/latest | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'].lstrip('v'))")
            ARCH=$(uname -m); [[ "$ARCH" == "x86_64" ]] && ARCH="amd64"
            mkdir -p "$HOME/.local"
            curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_${ARCH}.tar.gz" \
              | tar xz --strip-components=1 -C "$HOME/.local"
            export PATH="$HOME/.local/bin:$PATH"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            gh --version
          fi

      - name: Install Claude CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          claude --version

      - name: Discover latest nightly run IDs
        id: runs
        run: |
          VELOX_RUN=$(gh run list -R "$REPO" --workflow velox-nightly.yml --limit 1 --json databaseId -q '.[0].databaseId')
          PRESTO_RUN=$(gh run list -R "$REPO" --workflow presto-nightly.yml --limit 1 --json databaseId -q '.[0].databaseId')
          echo "velox_run=${VELOX_RUN}" >> "$GITHUB_OUTPUT"
          echo "presto_run=${PRESTO_RUN}" >> "$GITHUB_OUTPUT"
          echo "Velox nightly run ID: ${VELOX_RUN:-none}"
          echo "Presto nightly run ID: ${PRESTO_RUN:-none}"

      - name: Analyse velox nightly run
        if: ${{ steps.runs.outputs.velox_run != '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: | # zizmor: ignore[template-injection]
          python3 scripts/workflow_status/workflow_status.py \
            --run-id ${{ steps.runs.outputs.velox_run }} \
            --repo "$REPO" \
            --output velox-status-payload.json

      - name: Analyse presto nightly run
        if: ${{ steps.runs.outputs.presto_run != '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: | # zizmor: ignore[template-injection]
          python3 scripts/workflow_status/workflow_status.py \
            --run-id ${{ steps.runs.outputs.presto_run }} \
            --repo "$REPO" \
            --output presto-status-payload.json

      - name: Upload reports as artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: nightly-reports
          path: |
            velox-status-payload.json
            presto-status-payload.json

      - name: Send velox status to Slack
        if: ${{ always() && hashFiles('velox-status-payload.json') != '' }}
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a  # v2.1.1
        with:
          payload-file-path: velox-status-payload.json
          webhook: ${{ secrets.SLACK_WEBHOOK_NIGHTLY_STATUS_URL }}
          webhook-type: incoming-webhook

      - name: Send presto status to Slack
        if: ${{ always() && hashFiles('presto-status-payload.json') != '' }}
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a  # v2.1.1
        with:
          payload-file-path: presto-status-payload.json
          webhook: ${{ secrets.SLACK_WEBHOOK_NIGHTLY_STATUS_URL }}
          webhook-type: incoming-webhook
