name: presto
run-name: presto (${{ inputs.variant_label }})

on:
  workflow_dispatch:
    inputs:
      variant_label: &variant_label
        description: 'Run label shown in the workflow name'
        type: string
        required: false
        default: 'manual'
      presto_repository: &presto_repository
        description: 'Presto repository'
        type: string
        required: false
        default: 'prestodb/presto'
      presto_commit: &presto_commit
        description: 'Presto commit SHA or branch'
        type: string
        required: false
        default: 'master'
      velox_repository: &velox_repository
        description: 'Velox repository'
        type: string
        required: false
        default: 'facebookincubator/velox'
      velox_commit: &velox_commit
        description: 'Velox commit SHA, branch, or "presto-pinned"'
        type: string
        required: false
        default: 'presto-pinned'
      run_tests: &run_tests
        description: 'Run tests after build'
        type: boolean
        required: false
        default: true
      build_type: &build_type
        description: 'One of: [nightly, manual]'
        type: string
        required: false
        default: 'manual'
      build_variant: &build_variant
        description: 'One of: [upstream, pinned, manual]'
        type: string
        required: false
        default: 'manual'

  workflow_call:
    inputs:
      variant_label: *variant_label
      presto_repository: *presto_repository
      presto_commit: *presto_commit
      velox_repository: *velox_repository
      velox_commit: *velox_commit
      run_tests: *run_tests
      build_type: *build_type
      build_variant: *build_variant
      run_id_suffix:
        description: 'Optional run ID suffix appended to image tags'
        type: string
        required: false
        default: ''

permissions: {}

jobs:
  resolve-run-id-suffix:
    runs-on: ubuntu-latest
    outputs:
      run_id_suffix: ${{ steps.resolve.outputs.run_id_suffix }}
      intermediate_tag_suffix: ${{ steps.resolve.outputs.intermediate_tag_suffix }}
    steps:
      - name: Resolve run ID suffix
        id: resolve
        env:
          INPUT_RUN_ID_SUFFIX: ${{ inputs.run_id_suffix || '' }}
          VARIANT_LABEL: ${{ inputs.variant_label || '' }}
          BUILD_VARIANT: ${{ inputs.build_variant || '' }}
          GITHUB_RUN_ID_VALUE: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT_VALUE: ${{ github.run_attempt }}
        run: |
          if [[ -n "${INPUT_RUN_ID_SUFFIX}" ]]; then
            echo "run_id_suffix=${INPUT_RUN_ID_SUFFIX}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "run_id_suffix=-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "run_id_suffix=" >> "$GITHUB_OUTPUT"
          fi

          label="$(printf '%s' "${VARIANT_LABEL:-${BUILD_VARIANT:-manual}}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+//; s/-+$//; s/-+/-/g' \
            | cut -c1-40 \
            | sed -E 's/^-+//; s/-+$//')"
          if [[ -z "${label}" ]]; then
            label="manual"
          fi
          namespace="${GITHUB_RUN_ID_VALUE}-${GITHUB_RUN_ATTEMPT_VALUE}-${label}"
          echo "intermediate_tag_suffix=-${namespace}" >> "$GITHUB_OUTPUT"

  resolve-commits:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      velox_sha: ${{ steps.resolve.outputs.velox_sha }}
      velox_short_sha: ${{ steps.resolve.outputs.velox_short_sha }}
      presto_sha: ${{ steps.resolve.outputs.presto_sha }}
      presto_short_sha: ${{ steps.resolve.outputs.presto_short_sha }}
      date: ${{ steps.resolve.outputs.date }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/resolve-commits
        id: resolve
        with:
          velox_repository: ${{ inputs.velox_repository }}
          velox_commit: ${{ inputs.velox_commit }}
          presto_repository: ${{ inputs.presto_repository }}
          presto_commit: ${{ inputs.presto_commit }}
          github_token: ${{ github.token }}

  presto-build:
    needs: [resolve-commits, resolve-run-id-suffix]
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
      artifact-metadata: write
    uses: ./.github/workflows/presto-build.yml
    with:
      velox_repository: ${{ inputs.velox_repository }}
      presto_repository: ${{ inputs.presto_repository }}
      velox_sha: ${{ needs.resolve-commits.outputs.velox_sha }}
      velox_short_sha: ${{ needs.resolve-commits.outputs.velox_short_sha }}
      presto_sha: ${{ needs.resolve-commits.outputs.presto_sha }}
      presto_short_sha: ${{ needs.resolve-commits.outputs.presto_short_sha }}
      date: ${{ needs.resolve-commits.outputs.date }}
      build_type: ${{ inputs.build_type }}
      build_variant: ${{ inputs.build_variant }}
      run_id_suffix: ${{ needs.resolve-run-id-suffix.outputs.run_id_suffix }}
      intermediate_tag_suffix: ${{ needs.resolve-run-id-suffix.outputs.intermediate_tag_suffix }}
    secrets: inherit  # zizmor: ignore[secrets-inherit]

  presto-test:
    needs: [resolve-commits, resolve-run-id-suffix, presto-build]
    if: ${{ inputs.run_tests }}
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/presto-test.yml
    with:
      velox_short_sha: ${{ needs.resolve-commits.outputs.velox_short_sha }}
      presto_short_sha: ${{ needs.resolve-commits.outputs.presto_short_sha }}
      date: ${{ needs.resolve-commits.outputs.date }}
      run_id_suffix: ${{ needs.resolve-run-id-suffix.outputs.run_id_suffix }}
