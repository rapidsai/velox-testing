            echo "Creating multi-arch manifest: ${tag}"
            docker buildx imagetools create -t "${REGISTRY}/${IMAGE_NAME}:${tag}" \
              "${REGISTRY}/${IMAGE_NAME}:${tag}-amd64" \
              "${REGISTRY}/${IMAGE_NAME}:${tag}-arm64"
          }
          for cuda in 12.9 13.1; do
            create_manifest "presto-${PRESTO_SHORT_SHA}-velox-${VELOX_SHORT_SHA}-gpu-cuda${cuda}-${BUILD_DATE}"
          done
          create_manifest "presto-${PRESTO_SHORT_SHA}-velox-${VELOX_SHORT_SHA}-cpu-${BUILD_DATE}"

  test-velox-cpu:
    if: inputs.build_velox && inputs.run_tests
    name: test-velox-cpu (${{ matrix.image_tag }}, ${{ matrix.arch }})
    needs: [resolve-commits, merge-velox-build]
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            image_tag: gpu-cuda12.9
          - arch: amd64
            image_tag: gpu-cuda13.1
          - arch: amd64
            image_tag: cpu
    runs-on: linux-${{ matrix.arch }}-cpu16
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}
      - name: Run CPU tests
        env:
          VELOX_SHORT_SHA: ${{ needs.resolve-commits.outputs.velox_short_sha }}
          BUILD_DATE: ${{ needs.resolve-commits.outputs.date }}
          IMAGE_TAG: ${{ matrix.image_tag }}
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}:velox-${VELOX_SHORT_SHA}-${IMAGE_TAG}-${BUILD_DATE}"
          echo "Testing image: ${IMAGE}"
          docker pull "${IMAGE}"
          docker run --rm "${IMAGE}" bash -c \
            "cd /opt/velox-build/release && ctest -j 16 --label-exclude cuda_driver --output-on-failure --no-tests=error"

  test-velox-gpu:
    if: inputs.build_velox && inputs.run_tests
    name: test-velox-gpu (${{ matrix.image_tag }}, ${{ matrix.arch }})
    needs: [resolve-commits, merge-velox-build]
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            image_tag: gpu-cuda12.9
            gpu: l4
          - arch: amd64
            image_tag: gpu-cuda13.1
            gpu: l4
    runs-on: linux-${{ matrix.arch }}-gpu-${{ matrix.gpu }}-latest-1
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}
      - name: Run GPU tests
        env:
          VELOX_SHORT_SHA: ${{ needs.resolve-commits.outputs.velox_short_sha }}
          BUILD_DATE: ${{ needs.resolve-commits.outputs.date }}
          IMAGE_TAG: ${{ matrix.image_tag }}
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}:velox-${VELOX_SHORT_SHA}-${IMAGE_TAG}-${BUILD_DATE}"
          echo "Testing image: ${IMAGE}"
          docker pull "${IMAGE}"
          docker run --rm --gpus all "${IMAGE}" bash -c \
            "cd /opt/velox-build/release && ctest -j 8 --label-regex cuda_driver --output-on-failure --no-tests=error"

  test-presto:
    if: inputs.build_presto && inputs.run_tests
    name: test (presto-gpu-cuda${{ matrix.cuda_version }}, ${{ matrix.arch }})
    needs: [resolve-commits, merge-presto-build]
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            cuda_version: *cuda12
            gpu: l4
          - arch: amd64
            cuda_version: *cuda13
            gpu: l4
    runs-on: linux-${{ matrix.arch }}-gpu-${{ matrix.gpu }}-latest-1
    steps:
      - name: Checkout velox-testing
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Log in to the Container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}
      - name: Smoke test
        env:
          VELOX_SHORT_SHA: ${{ needs.resolve-commits.outputs.velox_short_sha }}
          PRESTO_SHORT_SHA: ${{ needs.resolve-commits.outputs.presto_short_sha }}
          BUILD_DATE: ${{ needs.resolve-commits.outputs.date }}
          CUDA_VERSION: ${{ matrix.cuda_version }}
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}:presto-${PRESTO_SHORT_SHA}-velox-${VELOX_SHORT_SHA}-gpu-cuda${CUDA_VERSION}-${BUILD_DATE}"
          echo "Testing image: ${IMAGE}"
          docker pull "${IMAGE}"
          echo "--- nvidia-smi ---"
          docker run --rm --gpus all "${IMAGE}" nvidia-smi
          echo "--- presto_server startup with cudf.enabled=true ---"
          docker run --rm --gpus all \
            -v "${GITHUB_WORKSPACE}/presto/docker/config/smoke-test:/opt/presto-server/etc:ro" \
            "${IMAGE}" bash -c '
          set -euo pipefail
          ldconfig
          mkdir -p /var/lib/presto/data/hive/metastore

          /usr/bin/presto_server --etc-dir=/opt/presto-server/etc &
          SERVER_PID=$!

          MAX_RETRIES=12
          for i in $(seq 1 $MAX_RETRIES); do
            STATE=$(curl -sf http://localhost:8080/v1/info/state 2>/dev/null || true)
            if [[ "$STATE" == "\"ACTIVE\"" ]]; then
              echo "presto_server reached ACTIVE state after ~$((i * 5))s"
              INFO=$(curl -sf http://localhost:8080/v1/info)
              echo "Server info: ${INFO}"
              kill $SERVER_PID
              wait $SERVER_PID 2>/dev/null || true
              exit 0
            fi
            sleep 5
          done
          echo "ERROR: presto_server did not reach ACTIVE state within 60s"
          kill $SERVER_PID 2>/dev/null
          wait $SERVER_PID 2>/dev/null || true
          exit 1
          '
