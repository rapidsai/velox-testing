name: presto-nightly

on:
  schedule:
    - cron: "0 5 * * *"  # 5am UTC / 1am EST
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  upstream:
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
      artifact-metadata: write
    uses: ./.github/workflows/presto.yml
    with:
      variant_label: upstream
      presto_repository: prestodb/presto
      presto_commit: master
      velox_repository: facebookincubator/velox
      velox_commit: main
      run_tests: true
      build_type: nightly
      build_variant: upstream
      final_run_id_suffix: ${{ github.event_name == 'workflow_dispatch' && format('-{0}', github.run_id) || '' }}
    secrets: inherit  # zizmor: ignore[secrets-inherit]

  pinned:
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
      artifact-metadata: write
    uses: ./.github/workflows/presto.yml
    with:
      variant_label: pinned
      presto_repository: prestodb/presto
      presto_commit: master
      velox_repository: facebookincubator/velox
      velox_commit: presto-pinned
      run_tests: true
      build_type: nightly
      build_variant: pinned
      final_run_id_suffix: ${{ github.event_name == 'workflow_dispatch' && format('-{0}', github.run_id) || '' }}
    secrets: inherit  # zizmor: ignore[secrets-inherit]
