name: presto-nightly

on:
  schedule:
    - cron: "0 5 * * *"  # 5am UTC / 1am EST
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  upstream:
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
      artifact-metadata: write
    uses: ./.github/workflows/presto.yml
    with:
      variant_label: upstream
      presto_repository: prestodb/presto
      presto_commit: master
      velox_repository: facebookincubator/velox
      velox_commit: main
      run_tests: true
      build_type: nightly
      build_variant: upstream
    secrets: inherit  # zizmor: ignore[secrets-inherit]

  pinned:
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
      artifact-metadata: write
    uses: ./.github/workflows/presto.yml
    with:
      variant_label: pinned
      presto_repository: prestodb/presto
      presto_commit: master
      velox_repository: facebookincubator/velox
      velox_commit: presto-pinned
      run_tests: true
      build_type: nightly
      build_variant: pinned
    secrets: inherit  # zizmor: ignore[secrets-inherit]

  staging:
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
      artifact-metadata: write
    uses: ./.github/workflows/presto.yml
    with:
      variant_label: staging
      presto_repository: ${{ vars.STABLE_PRESTO_REPO }}
      presto_commit: ${{ vars.STABLE_PRESTO_COMMIT }}
      velox_repository: ${{ vars.STABLE_VELOX_REPO }}
      velox_commit: ${{ vars.STABLE_VELOX_COMMIT }}
      run_tests: true
      build_type: nightly
      build_variant: staging
    secrets: inherit  # zizmor: ignore[secrets-inherit]
