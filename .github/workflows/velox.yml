name: velox
run-name: velox (${{ inputs.variant_label }})

on:
  workflow_dispatch:
    inputs:
      variant_label: &variant_label
        description: 'Run label shown in the workflow name'
        type: string
        required: false
        default: 'manual'
      velox_repository: &velox_repository
        description: 'Velox repository'
        type: string
        required: false
        default: 'facebookincubator/velox'
      velox_commit: &velox_commit
        description: 'Velox commit SHA or branch'
        type: string
        required: false
        default: 'main'
      run_tests: &run_tests
        description: 'Run tests after build'
        type: boolean
        required: false
        default: true
      build_type: &build_type
        description: 'One of: [nightly, manual]'
        type: string
        required: false
        default: 'manual'
      build_variant: &build_variant
        description: 'One of: [upstream, manual]'
        type: string
        required: false
        default: 'manual'

  workflow_call:
    inputs:
      variant_label: *variant_label
      velox_repository: *velox_repository
      velox_commit: *velox_commit
      run_tests: *run_tests
      build_type: *build_type
      build_variant: *build_variant

permissions: {}

jobs:
  resolve-run-id-suffix:
    runs-on: ubuntu-latest
    outputs:
      run_id_suffix: ${{ steps.resolve.outputs.run_id_suffix }}
      intermediate_tag_suffix: ${{ steps.resolve.outputs.intermediate_tag_suffix }}
    steps:
      - name: Resolve run ID suffix
        id: resolve
        env:
          BUILD_VARIANT: ${{ inputs.build_variant || '' }}
          GITHUB_RUN_ID_VALUE: ${{ github.run_id }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "run_id_suffix=-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "run_id_suffix=" >> "$GITHUB_OUTPUT"
          fi

          if [[ -z "${BUILD_VARIANT}" ]]; then
            BUILD_VARIANT="manual"
          fi
          echo "intermediate_tag_suffix=-${GITHUB_RUN_ID_VALUE}-${BUILD_VARIANT}" >> "$GITHUB_OUTPUT"

  resolve-commits:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      velox_sha: ${{ steps.resolve.outputs.velox_sha }}
      velox_short_sha: ${{ steps.resolve.outputs.velox_short_sha }}
      date: ${{ steps.resolve.outputs.date }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/resolve-commits
        id: resolve
        with:
          velox_repository: ${{ inputs.velox_repository }}
          velox_commit: ${{ inputs.velox_commit }}
          github_token: ${{ github.token }}

  velox-build:
    needs: [resolve-commits, resolve-run-id-suffix]
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
      artifact-metadata: write
    uses: ./.github/workflows/velox-build.yml
    with:
      velox_repository: ${{ inputs.velox_repository }}
      velox_sha: ${{ needs.resolve-commits.outputs.velox_sha }}
      velox_short_sha: ${{ needs.resolve-commits.outputs.velox_short_sha }}
      date: ${{ needs.resolve-commits.outputs.date }}
      build_type: ${{ inputs.build_type }}
      build_variant: ${{ inputs.build_variant }}
      run_id_suffix: ${{ needs.resolve-run-id-suffix.outputs.run_id_suffix }}
      intermediate_tag_suffix: ${{ needs.resolve-run-id-suffix.outputs.intermediate_tag_suffix }}
    secrets: inherit  # zizmor: ignore[secrets-inherit]

  velox-test:
    needs: [resolve-commits, resolve-run-id-suffix, velox-build]
    if: ${{ inputs.run_tests }}
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/velox-test.yml
    with:
      velox_short_sha: ${{ needs.resolve-commits.outputs.velox_short_sha }}
      date: ${{ needs.resolve-commits.outputs.date }}
      run_id_suffix: ${{ needs.resolve-run-id-suffix.outputs.run_id_suffix }}

  velox-benchmark:
    needs: [resolve-commits, resolve-run-id-suffix, velox-build]
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/velox-benchmark.yml
    with:
      velox_short_sha: ${{ needs.resolve-commits.outputs.velox_short_sha }}
      date: ${{ needs.resolve-commits.outputs.date }}
      run_id_suffix: ${{ needs.resolve-run-id-suffix.outputs.run_id_suffix }}
      variant_label: ${{ inputs.variant_label }}
