name: Create Staging Branch (Reusable)

on:
  workflow_call:
    inputs:
      base_repository:
        description: 'Base repository (e.g., facebookincubator/velox)'
        type: string
        required: true
      base_branch:
        description: 'Base branch to sync from'
        type: string
        required: true
      target_repository:
        description: 'Target repository (e.g., rapidsai/velox)'
        type: string
        required: true
      target_branch:
        description: 'Target branch name'
        type: string
        required: true
        default: 'staging'
      auto_fetch_prs:
        description: 'Auto-fetch non-draft PRs with specified label'
        type: boolean
        required: false
        default: true
      pr_labels:
        description: 'Comma-separated PR labels to auto-fetch'
        type: string
        required: false
        default: ''
      manual_pr_numbers:
        description: 'Comma-separated PR numbers to merge'
        type: string
        required: false
        default: ''
      exclude_pr_numbers:
        description: 'Comma-separated PR numbers to exclude from auto-fetch results'
        type: string
        required: false
        default: ''
      force_push:
        description: 'Force push to target branch'
        type: boolean
        required: false
        default: false
      additional_repository:
        description: 'Additional repository to merge from'
        type: string
        required: false
        default: ''
      additional_branch:
        description: 'Branch from additional repository to merge'
        type: string
        required: false
        default: ''
      script_path:
        description: 'Path to the staging entrypoint (e.g., ./velox-testing/scripts/create_staging/create_staging.py)'
        type: string
        required: true
    secrets:
      fork_pat:
        description: 'GitHub PAT for target repository'
        required: true
      anthropic_api_key:
        description: 'Anthropic API key (optional; omit for workflows that do not use Claude)'
        required: true

jobs:
  create-staging:
    runs-on: linux-amd64-cpu4
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.fork_pat }}
      TARGET_REPO: ${{ inputs.target_repository }}
      SCRIPT_PATH: ${{ inputs.script_path }}
      ANTHROPIC_API_KEY: ${{ secrets.anthropic_api_key }}
      BASE_ARGS: >-
        --mode ci
        --base-repository ${{ inputs.base_repository }}
        --base-branch ${{ inputs.base_branch }}
        --target-repository ${{ inputs.target_repository }}
        --target-branch ${{ inputs.target_branch }}
        --auto-fetch-prs ${{ inputs.auto_fetch_prs }}
        ${{ inputs.pr_labels && format('--pr-labels {0}', inputs.pr_labels) || '' }}
        ${{ inputs.manual_pr_numbers && format('--manual-pr-numbers {0}', inputs.manual_pr_numbers) || '' }}
        ${{ inputs.exclude_pr_numbers && format('--exclude-pr-numbers {0}', inputs.exclude_pr_numbers) || '' }}
        ${{ inputs.additional_repository && format('--additional-repository {0}', inputs.additional_repository) || '' }}
        ${{ inputs.additional_branch && format('--additional-branch {0}', inputs.additional_branch) || '' }}
        --force-push ${{ inputs.force_push }}
    steps:
      - name: 📦 Checkout velox-testing
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          path: velox-testing
          persist-credentials: false

      - name: ⚙️ Setup Git Configuration
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install gh CLI
        run: |
          if command -v gh &>/dev/null; then
            echo "gh already available: $(gh --version | head -1)"
          else
            echo "Installing GitHub CLI to ~/.local..."
            GH_VERSION=$(curl -fsSL https://api.github.com/repos/cli/cli/releases/latest | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'].lstrip('v'))")
            ARCH=$(uname -m); [[ "$ARCH" == "x86_64" ]] && ARCH="amd64"
            mkdir -p "$HOME/.local"
            curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_${ARCH}.tar.gz" \
              | tar xz --strip-components=1 -C "$HOME/.local"
            export PATH="$HOME/.local/bin:$PATH"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            gh --version
          fi

      - name: Install Claude CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          claude --version

      - name: Prepare staging command
        run: |
          if [[ "${SCRIPT_PATH}" == *.py ]]; then
            echo "RUN_STAGING=python3 ${SCRIPT_PATH}" >> "${GITHUB_ENV}"
          else
            echo "RUN_STAGING=${SCRIPT_PATH}" >> "${GITHUB_ENV}"
          fi

      - name: 📥 Clone target repository
        run: |
          # Local directory name matches the target repo basename (e.g. rapidsai/velox -> velox).
          TARGET_DIR="${TARGET_REPO##*/}"
          echo "TARGET_CLONE_PATH=${GITHUB_WORKSPACE}/${TARGET_DIR}" >> "${GITHUB_ENV}"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${TARGET_REPO}.git" "${TARGET_DIR}"
          git -C "${TARGET_DIR}" rev-parse --is-inside-work-tree
          if ! git -C "${TARGET_DIR}" remote get-url origin >/dev/null 2>&1; then
            echo "::error::Clone succeeded but the target repo has no 'origin' remote (${TARGET_DIR})"
            exit 1
          fi
          echo "Verified: origin remote is set for ${TARGET_REPO} (clone at ${TARGET_DIR})"

      - name: ✈️ Preflight push (dry-run)
        run: ${RUN_STAGING} ${BASE_ARGS} --target-path "${TARGET_CLONE_PATH}" --step preflight-push

      - name: 🔄 Reset target branch
        run: ${RUN_STAGING} ${BASE_ARGS} --target-path "${TARGET_CLONE_PATH}" --step reset

      - name: 🔗 Merge additional repository/branch
        if: ${{ inputs.additional_repository != '' && inputs.additional_branch != '' }}
        run: ${RUN_STAGING} ${BASE_ARGS} --target-path "${TARGET_CLONE_PATH}" --step merge-additional

      - name: 📋 Fetch PR list
        run: ${RUN_STAGING} ${BASE_ARGS} --target-path "${TARGET_CLONE_PATH}" --step fetch-prs

      - name: 🧪 Test merge compatibility
        run: ${RUN_STAGING} ${BASE_ARGS} --target-path "${TARGET_CLONE_PATH}" --step test-merge

      - name: 🧪 Test pairwise merge compatibility
        run: ${RUN_STAGING} ${BASE_ARGS} --target-path "${TARGET_CLONE_PATH}" --step test-pairwise

      - name: 🔀 Merge PRs
        run: ${RUN_STAGING} ${BASE_ARGS} --target-path "${TARGET_CLONE_PATH}" --step merge

      - name: 📝 Create staging manifest
        run: ${RUN_STAGING} ${BASE_ARGS} --target-path "${TARGET_CLONE_PATH}" --step manifest

      - name: 🚀 Push branches
        run: ${RUN_STAGING} ${BASE_ARGS} --target-path "${TARGET_CLONE_PATH}" --step push
