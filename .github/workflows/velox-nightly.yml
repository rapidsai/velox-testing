name: velox-nightly

on:
  schedule:
    - cron: "0 5 * * *"  # 5am UTC / 1am EST
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  resolve-run-id-suffix:
    runs-on: ubuntu-latest
    outputs:
      run_id_suffix: ${{ steps.resolve.outputs.run_id_suffix }}
    steps:
      - name: Resolve run ID suffix
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "run_id_suffix=-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "run_id_suffix=" >> "$GITHUB_OUTPUT"
          fi

  upstream:
    needs: [resolve-run-id-suffix]
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
      artifact-metadata: write
    uses: ./.github/workflows/velox.yml
    with:
      variant_label: upstream
      velox_repository: facebookincubator/velox
      velox_commit: main
      run_tests: true
      build_type: nightly
      build_variant: upstream
      run_id_suffix: ${{ needs.resolve-run-id-suffix.outputs.run_id_suffix }}
    secrets: inherit  # zizmor: ignore[secrets-inherit]
