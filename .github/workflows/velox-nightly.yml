name: velox-nightly

on:
  schedule:
    - cron: "0 5 * * *"  # 5am UTC / 1am EST
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  upstream:
    uses: ./.github/workflows/velox.yml
    with:
      variant_label: upstream
      velox_repository: facebookincubator/velox
      velox_commit: main
      run_tests: true
      build_type: ${{ github.event_name == 'schedule' && 'nightly' || 'manual' }}
      build_variant: upstream
    secrets: inherit

  staging:
    uses: ./.github/workflows/velox.yml
    with:
      variant_label: staging
      velox_repository: ${{ vars.STABLE_VELOX_REPO }}
      velox_commit: ${{ vars.STABLE_VELOX_COMMIT }}
      run_tests: true
      build_type: ${{ github.event_name == 'schedule' && 'nightly' || 'manual' }}
      build_variant: staging
    secrets: inherit
