name: "ci-images (nightly)"

on:
  schedule:
    - cron: "0 5 * * *"  # 5am UTC / 1am EST

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── upstream (velox main + presto master) ──────────────────────────────
  resolve-commits-upstream:
    name: resolve-commits (upstream)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      velox_sha: ${{ steps.resolve.outputs.velox_sha }}
      velox_short_sha: ${{ steps.resolve.outputs.velox_short_sha }}
      presto_sha: ${{ steps.resolve.outputs.presto_sha }}
      presto_short_sha: ${{ steps.resolve.outputs.presto_short_sha }}
      date: ${{ steps.resolve.outputs.date }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/resolve-commits
        id: resolve
        with:
          velox_repository: facebookincubator/velox
          velox_commit: main
          presto_repository: prestodb/presto
          presto_commit: master
          github_token: ${{ github.token }}

  velox-build-upstream:
    name: velox-build (upstream)
    needs: [resolve-commits-upstream]
    uses: ./.github/workflows/velox-build.yml
    with:
      velox_repository: facebookincubator/velox
      velox_sha: ${{ needs.resolve-commits-upstream.outputs.velox_sha }}
      velox_short_sha: ${{ needs.resolve-commits-upstream.outputs.velox_short_sha }}
      date: ${{ needs.resolve-commits-upstream.outputs.date }}
    secrets: inherit

  presto-build-upstream:
    name: presto-build (upstream)
    needs: [resolve-commits-upstream]
    uses: ./.github/workflows/presto-build.yml
    with:
      velox_repository: facebookincubator/velox
      presto_repository: prestodb/presto
      velox_sha: ${{ needs.resolve-commits-upstream.outputs.velox_sha }}
      velox_short_sha: ${{ needs.resolve-commits-upstream.outputs.velox_short_sha }}
      presto_sha: ${{ needs.resolve-commits-upstream.outputs.presto_sha }}
      presto_short_sha: ${{ needs.resolve-commits-upstream.outputs.presto_short_sha }}
      date: ${{ needs.resolve-commits-upstream.outputs.date }}
    secrets: inherit

  velox-test-upstream:
    name: velox-test (upstream)
    needs: [resolve-commits-upstream, velox-build-upstream]
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/velox-test.yml
    with:
      velox_short_sha: ${{ needs.resolve-commits-upstream.outputs.velox_short_sha }}
      date: ${{ needs.resolve-commits-upstream.outputs.date }}
    secrets: inherit

  presto-test-upstream:
    name: presto-test (upstream)
    needs: [resolve-commits-upstream, presto-build-upstream]
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/presto-test.yml
    with:
      velox_short_sha: ${{ needs.resolve-commits-upstream.outputs.velox_short_sha }}
      presto_short_sha: ${{ needs.resolve-commits-upstream.outputs.presto_short_sha }}
      date: ${{ needs.resolve-commits-upstream.outputs.date }}
    secrets: inherit

  # ── pinned (presto's pinned velox submodule + presto master) ───────────
  resolve-commits-pinned:
    name: resolve-commits (pinned)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      velox_sha: ${{ steps.resolve.outputs.velox_sha }}
      velox_short_sha: ${{ steps.resolve.outputs.velox_short_sha }}
      presto_sha: ${{ steps.resolve.outputs.presto_sha }}
      presto_short_sha: ${{ steps.resolve.outputs.presto_short_sha }}
      date: ${{ steps.resolve.outputs.date }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/resolve-commits
        id: resolve
        with:
          velox_repository: facebookincubator/velox
          velox_commit: presto-pinned
          presto_repository: prestodb/presto
          presto_commit: master
          github_token: ${{ github.token }}

  velox-build-pinned:
    name: velox-build (pinned)
    needs: [resolve-commits-pinned]
    uses: ./.github/workflows/velox-build.yml
    with:
      velox_repository: facebookincubator/velox
      velox_sha: ${{ needs.resolve-commits-pinned.outputs.velox_sha }}
      velox_short_sha: ${{ needs.resolve-commits-pinned.outputs.velox_short_sha }}
      date: ${{ needs.resolve-commits-pinned.outputs.date }}
    secrets: inherit

  presto-build-pinned:
    name: presto-build (pinned)
    needs: [resolve-commits-pinned]
    uses: ./.github/workflows/presto-build.yml
    with:
      velox_repository: facebookincubator/velox
      presto_repository: prestodb/presto
      velox_sha: ${{ needs.resolve-commits-pinned.outputs.velox_sha }}
      velox_short_sha: ${{ needs.resolve-commits-pinned.outputs.velox_short_sha }}
      presto_sha: ${{ needs.resolve-commits-pinned.outputs.presto_sha }}
      presto_short_sha: ${{ needs.resolve-commits-pinned.outputs.presto_short_sha }}
      date: ${{ needs.resolve-commits-pinned.outputs.date }}
    secrets: inherit

  velox-test-pinned:
    name: velox-test (pinned)
    needs: [resolve-commits-pinned, velox-build-pinned]
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/velox-test.yml
    with:
      velox_short_sha: ${{ needs.resolve-commits-pinned.outputs.velox_short_sha }}
      date: ${{ needs.resolve-commits-pinned.outputs.date }}
    secrets: inherit

  presto-test-pinned:
    name: presto-test (pinned)
    needs: [resolve-commits-pinned, presto-build-pinned]
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/presto-test.yml
    with:
      velox_short_sha: ${{ needs.resolve-commits-pinned.outputs.velox_short_sha }}
      presto_short_sha: ${{ needs.resolve-commits-pinned.outputs.presto_short_sha }}
      date: ${{ needs.resolve-commits-pinned.outputs.date }}
    secrets: inherit

  # ── staging (stable repo/commit vars) ──────────────────────────────────
  resolve-commits-staging:
    name: resolve-commits (staging)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      velox_sha: ${{ steps.resolve.outputs.velox_sha }}
      velox_short_sha: ${{ steps.resolve.outputs.velox_short_sha }}
      presto_sha: ${{ steps.resolve.outputs.presto_sha }}
      presto_short_sha: ${{ steps.resolve.outputs.presto_short_sha }}
      date: ${{ steps.resolve.outputs.date }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/resolve-commits
        id: resolve
        with:
          velox_repository: ${{ vars.STABLE_VELOX_REPO }}
          velox_commit: ${{ vars.STABLE_VELOX_COMMIT }}
          presto_repository: ${{ vars.STABLE_PRESTO_REPO }}
          presto_commit: ${{ vars.STABLE_PRESTO_COMMIT }}
          github_token: ${{ github.token }}

  velox-build-staging:
    name: velox-build (staging)
    needs: [resolve-commits-staging]
    uses: ./.github/workflows/velox-build.yml
    with:
      velox_repository: ${{ vars.STABLE_VELOX_REPO }}
      velox_sha: ${{ needs.resolve-commits-staging.outputs.velox_sha }}
      velox_short_sha: ${{ needs.resolve-commits-staging.outputs.velox_short_sha }}
      date: ${{ needs.resolve-commits-staging.outputs.date }}
    secrets: inherit

  presto-build-staging:
    name: presto-build (staging)
    needs: [resolve-commits-staging]
    uses: ./.github/workflows/presto-build.yml
    with:
      velox_repository: ${{ vars.STABLE_VELOX_REPO }}
      presto_repository: ${{ vars.STABLE_PRESTO_REPO }}
      velox_sha: ${{ needs.resolve-commits-staging.outputs.velox_sha }}
      velox_short_sha: ${{ needs.resolve-commits-staging.outputs.velox_short_sha }}
      presto_sha: ${{ needs.resolve-commits-staging.outputs.presto_sha }}
      presto_short_sha: ${{ needs.resolve-commits-staging.outputs.presto_short_sha }}
      date: ${{ needs.resolve-commits-staging.outputs.date }}
    secrets: inherit

  velox-test-staging:
    name: velox-test (staging)
    needs: [resolve-commits-staging, velox-build-staging]
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/velox-test.yml
    with:
      velox_short_sha: ${{ needs.resolve-commits-staging.outputs.velox_short_sha }}
      date: ${{ needs.resolve-commits-staging.outputs.date }}
    secrets: inherit

  presto-test-staging:
    name: presto-test (staging)
    needs: [resolve-commits-staging, presto-build-staging]
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/presto-test.yml
    with:
      velox_short_sha: ${{ needs.resolve-commits-staging.outputs.velox_short_sha }}
      presto_short_sha: ${{ needs.resolve-commits-staging.outputs.presto_short_sha }}
      date: ${{ needs.resolve-commits-staging.outputs.date }}
    secrets: inherit
