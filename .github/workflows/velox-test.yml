name: velox-test

on:
  workflow_call:
    inputs:
      velox_short_sha:
        description: 'Short Velox commit SHA (7 chars)'
        type: string
        required: true
      date:
        description: 'Build date (YYYYMMDD)'
        type: string
        required: true

  workflow_dispatch:
    inputs:
      velox_image:
        description: 'Velox image to test. SHAs and date are parsed from the tag. e.g. ghcr.io/rapidsai/velox-testing-images:velox-3b263a7-gpu-cuda12.9-20260313'
        type: string
        required: false
        default: ''
      velox_short_sha:
        description: 'Short Velox commit SHA (ignored if velox_image is set)'
        type: string
        required: false
        default: ''
      date:
        description: 'Build date YYYYMMDD (ignored if velox_image is set)'
        type: string
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-images

jobs:
  resolve-inputs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      velox_short_sha: ${{ steps.resolve.outputs.velox_short_sha }}
      presto_short_sha: ${{ steps.resolve.outputs.presto_short_sha }}
      date: ${{ steps.resolve.outputs.date }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/resolve-inputs
        id: resolve
        with:
          image_tag: ${{ inputs.velox_image || '' }}
          velox_short_sha: ${{ inputs.velox_short_sha }}
          date: ${{ inputs.date }}

  test-velox-cpu:
    name: test-velox-cpu (${{ matrix.image_tag }}, ${{ matrix.arch }})
    needs: [resolve-inputs]
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            image_tag: cpu
          - arch: arm64
            image_tag: cpu
    runs-on: linux-${{ matrix.arch }}-cpu16
    steps:
      - &login_ghcr
        name: Log in to the Container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}
      - name: Run CPU tests
        env:
          VELOX_SHORT_SHA: ${{ needs.resolve-inputs.outputs.velox_short_sha }}
          BUILD_DATE: ${{ needs.resolve-inputs.outputs.date }}
          IMAGE_TAG: ${{ matrix.image_tag }}
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}:velox-${VELOX_SHORT_SHA}-${IMAGE_TAG}-${BUILD_DATE}"
          echo "Testing image: ${IMAGE}"
          docker pull "${IMAGE}"
          docker run --rm "${IMAGE}" bash -c \
            "cd /opt/velox-build/release && ctest -j 16 --label-exclude cuda_driver --output-on-failure --no-tests=error"

  test-velox-gpu:
    name: test-velox-gpu (${{ matrix.image_tag }}, ${{ matrix.arch }}, ${{ matrix.gpu }})
    needs: [resolve-inputs]
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # amd64
          - arch: amd64
            image_tag: 12.9
            gpu: l4
          - arch: amd64
            image_tag: 12.9
            gpu: a100
          - arch: amd64
            image_tag: 12.9
            gpu: h100
          - arch: amd64
            image_tag: 13.1
            gpu: l4
          - arch: amd64
            image_tag: 13.1
            gpu: a100
          - arch: amd64
            image_tag: 13.1
            gpu: h100
          # arm64
          - arch: arm64
            image_tag: 12.9
            gpu: l4
          - arch: arm64
            image_tag: 12.9
            gpu: a100
          - arch: arm64
            image_tag: 13.1
            gpu: l4
          - arch: arm64
            image_tag: 13.1
            gpu: a100
    runs-on: linux-${{ matrix.arch }}-gpu-${{ matrix.gpu }}-latest-1
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}
      - name: Run GPU tests
        env:
          VELOX_SHORT_SHA: ${{ needs.resolve-inputs.outputs.velox_short_sha }}
          BUILD_DATE: ${{ needs.resolve-inputs.outputs.date }}
          IMAGE_TAG: ${{ matrix.image_tag }}
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}:velox-${VELOX_SHORT_SHA}-gpu-cuda${IMAGE_TAG}-${BUILD_DATE}"
          echo "Testing image: ${IMAGE}"
          docker pull "${IMAGE}"
          docker run --rm --gpus all "${IMAGE}" bash -c \
            "cd /opt/velox-build/release && ctest -j 8 --label-regex cuda_driver --output-on-failure --no-tests=error"
