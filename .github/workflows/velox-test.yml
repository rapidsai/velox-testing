name: velox-test

on:
  workflow_call:
    inputs:
      velox_short_sha:
        description: 'Short Velox commit SHA (7 chars)'
        type: string
        required: true
      date:
        description: 'Build date (YYYYMMDD)'
        type: string
        required: true
      build_variant:
        description: 'Build variant used in final image tags'
        type: string
        required: true
      run_id:
        description: 'GitHub run ID for manual build image tags'
        type: string
        required: false
        default: ''
  workflow_dispatch:
    inputs:
      velox_short_sha:
        description: 'Short Velox commit SHA (7 chars)'
        type: string
        required: true
      date:
        description: 'Build date (YYYYMMDD)'
        type: string
        required: true
      build_variant:
        description: 'Build variant used in final image tags'
        type: string
        required: true
      run_id:
        description: 'GitHub run ID for manual build image tags; required when build_variant is manual'
        type: string
        required: false
        default: ''
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-images

permissions: {}

jobs:
  resolve-run-id-suffix:
    runs-on: ubuntu-latest
    outputs:
      run_id_suffix: ${{ steps.run_id_suffix.outputs.run_id_suffix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/resolve-run-id-suffix
        id: run_id_suffix
        with:
          build_variant: ${{ inputs.build_variant }}
          run_id: ${{ inputs.run_id }}

  test-velox-cpu:
    name: test-velox-cpu (${{ matrix.image_tag }}, ${{ matrix.arch }})
    needs: [resolve-run-id-suffix]
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            image_tag: cpu
          - arch: arm64
            image_tag: cpu
    runs-on: linux-${{ matrix.arch }}-cpu16
    steps:
      - &login_ghcr
        name: Log in to the Container registry
        env:
          REGISTRY: ${{ env.REGISTRY }}
          USERNAME: ${{ github.repository_owner }}
          PASSWORD: ${{ github.token }}
        run: |
          max_attempts=5
          delay_seconds=5
          for attempt in $(seq 1 "${max_attempts}"); do
            if printf '%s' "${PASSWORD}" | docker login "${REGISTRY}" --username "${USERNAME}" --password-stdin; then
              exit 0
            fi
            if [ "${attempt}" -eq "${max_attempts}" ]; then
              echo "Container registry login failed after ${max_attempts} attempts." >&2
              exit 1
            fi
            echo "Container registry login failed (attempt ${attempt}/${max_attempts}); retrying in ${delay_seconds}s..." >&2
            sleep "${delay_seconds}"
            delay_seconds=$((delay_seconds * 2))
          done
      - name: Run CPU tests
        env:
          VELOX_SHORT_SHA: ${{ inputs.velox_short_sha }}
          BUILD_DATE: ${{ inputs.date }}
          IMAGE_TAG: ${{ matrix.image_tag }}
          RUN_ID_SUFFIX: ${{ needs.resolve-run-id-suffix.outputs.run_id_suffix }}
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}:velox-${VELOX_SHORT_SHA}-${IMAGE_TAG}-${BUILD_DATE}${RUN_ID_SUFFIX}"
          echo "Testing image: ${IMAGE}"
          docker pull "${IMAGE}"
          docker run --rm "${IMAGE}" bash -c \
            "cd /opt/velox-build/release && ctest -j 16 --label-exclude cuda_driver --output-on-failure --no-tests=error"

  test-velox-gpu:
    name: test-velox-gpu (${{ matrix.image_tag }}, ${{ matrix.arch }}, ${{ matrix.gpu }})
    needs: [resolve-run-id-suffix]
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # amd64
          - arch: amd64
            image_tag: 12.9
            gpu: l4
          - arch: amd64
            image_tag: 12.9
            gpu: a100
          - arch: amd64
            image_tag: 12.9
            gpu: h100
          - arch: amd64
            image_tag: 13.1
            gpu: l4
          - arch: amd64
            image_tag: 13.1
            gpu: a100
          - arch: amd64
            image_tag: 13.1
            gpu: h100
          # arm64
          - arch: arm64
            image_tag: 12.9
            gpu: l4
          - arch: arm64
            image_tag: 12.9
            gpu: a100
          - arch: arm64
            image_tag: 13.1
            gpu: l4
          - arch: arm64
            image_tag: 13.1
            gpu: a100
    runs-on: linux-${{ matrix.arch }}-gpu-${{ matrix.gpu }}-latest-1
    steps:
      - name: Log in to the Container registry
        env:
          REGISTRY: ${{ env.REGISTRY }}
          USERNAME: ${{ github.repository_owner }}
          PASSWORD: ${{ github.token }}
        run: |
          max_attempts=5
          delay_seconds=5
          for attempt in $(seq 1 "${max_attempts}"); do
            if printf '%s' "${PASSWORD}" | docker login "${REGISTRY}" --username "${USERNAME}" --password-stdin; then
              exit 0
            fi
            if [ "${attempt}" -eq "${max_attempts}" ]; then
              echo "Container registry login failed after ${max_attempts} attempts." >&2
              exit 1
            fi
            echo "Container registry login failed (attempt ${attempt}/${max_attempts}); retrying in ${delay_seconds}s..." >&2
            sleep "${delay_seconds}"
            delay_seconds=$((delay_seconds * 2))
          done
      - name: Run GPU tests
        env:
          VELOX_SHORT_SHA: ${{ inputs.velox_short_sha }}
          BUILD_DATE: ${{ inputs.date }}
          IMAGE_TAG: ${{ matrix.image_tag }}
          RUN_ID_SUFFIX: ${{ needs.resolve-run-id-suffix.outputs.run_id_suffix }}
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}:velox-${VELOX_SHORT_SHA}-gpu-cuda${IMAGE_TAG}-${BUILD_DATE}${RUN_ID_SUFFIX}"
          echo "Testing image: ${IMAGE}"
          docker pull "${IMAGE}"
          docker run --rm --gpus all "${IMAGE}" bash -c \
            "cd /opt/velox-build/release && ctest -j 8 --label-regex cuda_driver --output-on-failure --no-tests=error"
