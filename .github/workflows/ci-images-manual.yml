name: "ci-images (manual)"

on:
  workflow_dispatch:
    inputs:
      velox_repository:
        description: 'Velox repository'
        type: string
        required: false
        default: 'facebookincubator/velox'
      velox_commit:
        description: 'Velox commit SHA, branch, or "presto-pinned" to use Presto submodule pin'
        type: string
        required: false
        default: 'presto-pinned'
      presto_repository:
        description: 'Presto repository'
        type: string
        required: false
        default: 'prestodb/presto'
      presto_commit:
        description: 'Presto commit SHA or branch'
        type: string
        required: false
        default: 'master'
      build_velox:
        description: 'Build Velox images'
        type: boolean
        required: false
        default: true
      build_presto:
        description: 'Build Presto images'
        type: boolean
        required: false
        default: true
      run_tests:
        description: 'Run tests after builds'
        type: boolean
        required: false
        default: true

jobs:
  resolve-commits:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      velox_sha: ${{ steps.resolve.outputs.velox_sha }}
      velox_short_sha: ${{ steps.resolve.outputs.velox_short_sha }}
      presto_sha: ${{ steps.resolve.outputs.presto_sha }}
      presto_short_sha: ${{ steps.resolve.outputs.presto_short_sha }}
      date: ${{ steps.resolve.outputs.date }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/resolve-commits
        id: resolve
        with:
          velox_repository: ${{ inputs.velox_repository }}
          velox_commit: ${{ inputs.velox_commit }}
          presto_repository: ${{ inputs.presto_repository }}
          presto_commit: ${{ inputs.presto_commit }}
          github_token: ${{ github.token }}

  velox-build:
    needs: [resolve-commits]
    if: ${{ inputs.build_velox }}
    uses: ./.github/workflows/velox-build.yml
    with:
      velox_repository: ${{ inputs.velox_repository }}
      velox_sha: ${{ needs.resolve-commits.outputs.velox_sha }}
      velox_short_sha: ${{ needs.resolve-commits.outputs.velox_short_sha }}
      date: ${{ needs.resolve-commits.outputs.date }}
    secrets: inherit

  presto-build:
    needs: [resolve-commits]
    if: ${{ inputs.build_presto }}
    uses: ./.github/workflows/presto-build.yml
    with:
      velox_repository: ${{ inputs.velox_repository }}
      presto_repository: ${{ inputs.presto_repository }}
      velox_sha: ${{ needs.resolve-commits.outputs.velox_sha }}
      velox_short_sha: ${{ needs.resolve-commits.outputs.velox_short_sha }}
      presto_sha: ${{ needs.resolve-commits.outputs.presto_sha }}
      presto_short_sha: ${{ needs.resolve-commits.outputs.presto_short_sha }}
      date: ${{ needs.resolve-commits.outputs.date }}
    secrets: inherit

  velox-test:
    needs: [resolve-commits, velox-build]
    if: ${{ inputs.run_tests && inputs.build_velox }}
    uses: ./.github/workflows/velox-test.yml
    with:
      velox_short_sha: ${{ needs.resolve-commits.outputs.velox_short_sha }}
      date: ${{ needs.resolve-commits.outputs.date }}
    secrets: inherit

  presto-test:
    needs: [resolve-commits, presto-build]
    if: ${{ inputs.run_tests && inputs.build_presto }}
    uses: ./.github/workflows/presto-test.yml
    with:
      velox_short_sha: ${{ needs.resolve-commits.outputs.velox_short_sha }}
      presto_short_sha: ${{ needs.resolve-commits.outputs.presto_short_sha }}
      date: ${{ needs.resolve-commits.outputs.date }}
    secrets: inherit
