name: "ci-images (manual)"

on:
  workflow_dispatch:
    inputs:
      velox_repository:
        description: 'Velox repository'
        type: string
        required: false
        default: 'facebookincubator/velox'
      velox_commit:
        description: 'Velox commit SHA, branch, or "presto-pinned" to use Presto submodule pin'
        type: string
        required: false
        default: 'presto-pinned'
      presto_repository:
        description: 'Presto repository'
        type: string
        required: false
        default: 'prestodb/presto'
      presto_commit:
        description: 'Presto commit SHA or branch'
        type: string
        required: false
        default: 'master'
      build_velox:
        description: 'Build Velox images'
        type: boolean
        required: false
        default: true
      build_presto:
        description: 'Build Presto images'
        type: boolean
        required: false
        default: true
      run_tests:
        description: 'Run tests after builds'
        type: boolean
        required: false
        default: true

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      velox_repository: ${{ inputs.velox_repository }}
      velox_commit: ${{ inputs.velox_commit }}
      presto_repository: ${{ inputs.presto_repository }}
      presto_commit: ${{ inputs.presto_commit }}
      build_velox: ${{ inputs.build_velox }}
      build_presto: ${{ inputs.build_presto }}
    secrets: inherit

  test:
    needs: [build]
    if: inputs.run_tests
    uses: ./.github/workflows/test.yml
    with:
      velox_short_sha: ${{ needs.build.outputs.velox_short_sha }}
      presto_short_sha: ${{ needs.build.outputs.presto_short_sha }}
      date: ${{ needs.build.outputs.date }}
    secrets: inherit
