name: "ci-images (manual)"

on:
  workflow_dispatch:
    inputs:
      velox_repository:
        description: 'Velox repository'
        type: string
        required: false
        default: 'facebookincubator/velox'
      velox_commit:
        description: 'Velox commit SHA, branch, or "presto-pinned" to use Presto submodule pin'
        type: string
        required: false
        default: 'presto-pinned'
      presto_repository:
        description: 'Presto repository'
        type: string
        required: false
        default: 'prestodb/presto'
      presto_commit:
        description: 'Presto commit SHA or branch'
        type: string
        required: false
        default: 'master'
      build_velox:
        description: 'Build Velox images'
        type: boolean
        required: false
        default: true
      build_presto:
        description: 'Build Presto images'
        type: boolean
        required: false
        default: true
      run_tests:
        description: 'Run tests after builds'
        type: boolean
        required: false
        default: true
      presto_image:
        description: 'Test existing Presto worker image (skips Presto builds). Full path or tag, e.g. ghcr.io/..:presto-8e27030-velox-3b263a7-gpu-cuda12.9-20260313'
        type: string
        required: false
        default: ''

jobs:
  build-and-test:
    uses: ./.github/workflows/build-and-test.yml
    with:
      velox_repository: ${{ inputs.velox_repository }}
      velox_commit: ${{ inputs.velox_commit }}
      presto_repository: ${{ inputs.presto_repository }}
      presto_commit: ${{ inputs.presto_commit }}
      build_velox: ${{ inputs.presto_image == '' && inputs.build_velox }}
      build_presto: ${{ inputs.presto_image == '' && inputs.build_presto }}
      run_tests: ${{ inputs.run_tests }}
      presto_image: ${{ inputs.presto_image }}
    secrets: inherit
