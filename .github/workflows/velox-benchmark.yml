name: velox-benchmark

on:
  workflow_call:
    inputs:
      velox_short_sha:
        description: 'Short Velox commit SHA (7 chars)'
        type: string
        required: true
      date:
        description: 'Build date (YYYYMMDD)'
        type: string
        required: true
      build_variant:
        description: 'Build variant used in final image tags'
        type: string
        required: true
  workflow_dispatch:
    inputs:
      velox_short_sha:
        description: 'Short Velox commit SHA (7 chars)'
        type: string
        required: true
      date:
        description: 'Build date (YYYYMMDD)'
        type: string
        required: true
      build_variant:
        description: 'Build variant used in final image tags'
        type: string
        required: true
      run_id:
        description: 'GitHub run ID for manual build image tags; required when build_variant is manual'
        type: string
        required: false
        default: ''
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-images

permissions: {}

jobs:
  resolve-run-id-suffix:
    runs-on: ubuntu-latest
    outputs:
      run_id_suffix: ${{ steps.run_id_suffix.outputs.run_id_suffix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/resolve-run-id-suffix
        id: run_id_suffix
        with:
          build_variant: ${{ inputs.build_variant }}
          run_id: ${{ inputs.run_id }}

  benchmark-velox-gpu:
    name: benchmark-velox-gpu (tpch, cuda${{ matrix.cuda_version }}, ${{ matrix.arch }}, ${{ matrix.gpu }})
    needs: [resolve-run-id-suffix]
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # amd64
          - arch: amd64
            cuda_version: '12.9'
            gpu: l4
          - arch: amd64
            cuda_version: '12.9'
            gpu: a100
          - arch: amd64
            cuda_version: '12.9'
            gpu: h100
          - arch: amd64
            cuda_version: '13.1'
            gpu: l4
          - arch: amd64
            cuda_version: '13.1'
            gpu: a100
          - arch: amd64
            cuda_version: '13.1'
            gpu: h100
          # arm64
          - arch: arm64
            cuda_version: '12.9'
            gpu: l4
          - arch: arm64
            cuda_version: '12.9'
            gpu: a100
          - arch: arm64
            cuda_version: '13.1'
            gpu: l4
          - arch: arm64
            cuda_version: '13.1'
            gpu: a100
    runs-on: linux-${{ matrix.arch }}-gpu-${{ matrix.gpu }}-latest-1
    env:
      TPCH_DATA_DIR: ${{ github.workspace }}/benchmark-data/tpch
    steps:
      - &login_ghcr
        name: Log in to the Container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - &checkout_velox_testing
        name: Checkout velox-testing
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Generate TPC-H benchmark data
        run: |
          benchmark_data_tools/scripts/generate_dataset.sh \
            --benchmark-type tpch \
            --data-dir-path "${TPCH_DATA_DIR}" \
            --scale-factor 10 \
            --convert-decimals-to-floats
          echo "--- metadata ---"
          cat "${TPCH_DATA_DIR}/metadata.json"
          echo "--- generated files ---"
          find "${TPCH_DATA_DIR}" -type f -exec ls -lh {} + | awk '{print $5, $NF}' | sort -k2

      - name: Run TPC-H GPU benchmarks
        env:
          VELOX_SHORT_SHA: ${{ inputs.velox_short_sha }}
          BUILD_DATE: ${{ inputs.date }}
          CUDA_VERSION: ${{ matrix.cuda_version }}
          RUN_ID_SUFFIX: ${{ needs.resolve-run-id-suffix.outputs.run_id_suffix }}
        working-directory: velox/scripts
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}:velox-${VELOX_SHORT_SHA}-gpu-cuda${CUDA_VERSION}-${BUILD_DATE}${RUN_ID_SUFFIX}"
          ./benchmark_velox.sh \
            --image "${IMAGE}" \
            --benchmark-type tpch \
            --device-type gpu \
            --data-dir "${TPCH_DATA_DIR}" \
            --num-repeats 2 \
            --output "${GITHUB_WORKSPACE}/benchmark-results"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: "velox-benchmark-tpch-gpu-cuda${{ matrix.cuda_version }}-${{ matrix.gpu }}-${{ matrix.arch }}-${{ inputs.velox_short_sha }}-${{ inputs.date }}-${{ inputs.build_variant }}${{ needs.resolve-run-id-suffix.outputs.run_id_suffix }}"
          path: benchmark-results
          if-no-files-found: error
          retention-days: 14
