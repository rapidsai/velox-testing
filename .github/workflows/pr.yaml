name: PR Checks

on:
  push:
    branches:
      - "pull-request/[0-9]+"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  pr-builder:
    needs:
      - checks
      - detect-changes
      - test_benchmark_data_tools
    permissions:
      contents: read
    uses: rapidsai/shared-workflows/.github/workflows/pr-builder.yaml@main  # zizmor: ignore[unpinned-uses]
    if: always()
    with:
      needs: ${{ toJSON(needs) }}

  checks:
    permissions:
      contents: read
    uses: rapidsai/shared-workflows/.github/workflows/checks.yaml@main  # zizmor: ignore[unpinned-uses]
    with:
      enable_check_size: false
      enable_check_generated_files: false
      enable_check_version_files_changed: false
      enable_check_version_against_tag: false

  detect-changes:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      benchmark_data_tools: ${{ steps.filter.outputs.benchmark_data_tools }}
    steps:
      - name: Checkout velox-testing
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3
        with:
          filters: |
            benchmark_data_tools:
              - "benchmark_data_tools/**"

  test_benchmark_data_tools:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.benchmark_data_tools == 'true' }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout velox-testing
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Test benchmark_data_tools
        uses: ./.github/actions/test-benchmark-data-tools
