# cuDF has no effect in CPU mode; disable to suppress startup warnings.
cudf.enabled=false

exchange.http-client.enable-connection-pool=true
exchange.max-buffer-size=1GB
sink.max-buffer-size=1GB
# Increase max bytes returned per exchange HTTP response to reduce round trips for large shuffles.
exchange.max-response-size=64MB

# Increase concurrent exchange fetch threads and connection limits for heavy multi-node shuffles.
exchange.client-threads=40
exchange.http-client.max-connections=5000
exchange.http-client.max-connections-per-server=5000
exchange.http-client.max-requests-queued-per-destination=4096

# Increase exchange HTTP/2 ingress timeout for large shuffles at high scale factors.
# Default is 20s which is too short for Q18/Q21 at SF3000+.
exchange.http-client.request-timeout=5m