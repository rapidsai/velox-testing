cluster-tag=native-cpu

# Infer NOT NULL constraints from function metadata to improve join cardinality estimates.
optimizer.joins-not-null-inference-strategy=USE_FUNCTION_METADATA
# Use a default filter factor when stats are missing to avoid assuming full selectivity.
optimizer.default-filter-factor-enabled=true
# Push an exchange below partial aggregation over GROUP ID to reduce shuffle volume.
optimizer.add-exchange-below-partial-aggregation-over-group-id=true