# CI-specific overrides for the coordinator's config_native.properties.
# Applied on top of configs generated by generate_presto_config.sh to
# constrain memory for CI container execution.
#
# Used by: presto/scripts/patch_ci_configs.sh

memory.heap-headroom-per-node=1GB
query.max-total-memory-per-node=4GB
query.max-total-memory=4GB
query.max-memory-per-node=3GB
query.max-memory=3GB
join-max-broadcast-table-size=100MB
experimental.max-revocable-memory-per-node=2GB
experimental.max-spill-per-node=2GB
experimental.query-max-spill-per-node=2GB
