# Default Spark configuration for Gluten integration tests and benchmarks.
# Each line is a key-value pair in the format: key value
# Lines starting with '#' and blank lines are ignored.
# Values from this file can be overridden by specifying a custom config file
# via the --spark-config option.

# ---------------------------------------------------------------------------
# Memory configuration
# ---------------------------------------------------------------------------

# JVM heap memory for the Spark driver process.
spark.driver.memory                                           20g

# JVM heap memory for each Spark executor process.
spark.executor.memory                                         48g

# Enable off-heap (native) memory for Velox/Gluten columnar execution.
# Velox allocates large buffers outside the JVM heap for vectorised processing.
spark.memory.offHeap.enabled                                  true

# Total off-heap memory available per executor. This is the primary memory
# pool used by Velox operators (hash tables, sort buffers, etc.).
spark.memory.offHeap.size                                     90g

# Maximum size of each serialised result that the driver will accept from an
# executor.
spark.driver.maxResultSize                                    2g

# ---------------------------------------------------------------------------
# Executor configuration
# ---------------------------------------------------------------------------

# Number of CPU cores allocated to each executor for parallel task execution.
spark.executor.cores                                          16

# Number of executor instances.  Set to 1 for local / single-node benchmarks.
spark.executor.instances                                      1

# ---------------------------------------------------------------------------
# SQL / Shuffle configuration
# ---------------------------------------------------------------------------

# Number of partitions used for shuffle operations (joins, aggregations, etc.).
# Higher values improve parallelism but add scheduling overhead.
spark.sql.shuffle.partitions                                  200

# Maximum bytes per partition when reading files. Larger values mean fewer
# but bigger partitions, which can improve I/O throughput for large datasets.
spark.sql.files.maxPartitionBytes                             2g

# Disable Adaptive Query Execution (AQE). AQE dynamically adjusts shuffle
# partitions and join strategies at runtime.
spark.sql.adaptive.enabled                                    false

# Skip waiting for data-local task scheduling. In single-node benchmarks
# locality is irrelevant, so setting this to 0 avoids unnecessary delays.
spark.locality.wait                                           0

# Disable runtime bloom filter pushdown.
spark.sql.optimizer.runtime.bloomFilter.enabled               false

# ---------------------------------------------------------------------------
# Gluten / Velox configuration
# ---------------------------------------------------------------------------

# Use Gluten's columnar shuffle manager instead of Spark's default row-based
# shuffle. This keeps data in columnar format throughout the shuffle,
# avoiding costly row to columnar conversions.
spark.shuffle.manager                                         org.apache.spark.shuffle.sort.ColumnarShuffleManager

# Force hash joins instead of allowing Spark to choose sort-merge joins.
# Hash joins are generally faster for in-memory columnar execution.
spark.gluten.sql.columnar.forceShuffledHashJoin               true

# Enable Velox debug mode to log the Velox plan node tree for each task.
spark.gluten.sql.debug                                        true

# Enable Spark's built-in vectorised Parquet reader. This provides faster
# Parquet decoding compared to the default row-based reader.
spark.sql.parquet.enableVectorizedReader                      true
