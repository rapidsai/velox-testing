# Spark configuration overrides for "master plan" mode.
#
# The master plan collapses Spark's multi-stage query plan into a single
# Substrait plan executed entirely by Velox, replacing Spark's shuffle
# with Velox's in-process LocalPartitionNode.
#
# Usage:
#   run_benchmark.sh -b tpch -q "1,3" -d tpch_sf10 \
#     --spark-config spark_gluten/testing/config/masterplan.conf
#
# These values override the defaults in default.conf.

# ---------------------------------------------------------------------------
# Master plan mode
# ---------------------------------------------------------------------------

# Enable master plan: serialize the full query (including exchange boundaries)
# as a single Substrait plan. Velox handles exchange internally via
# LocalPartitionNode instead of Spark managing separate stages.
spark.gluten.sql.columnar.veloxMasterPlan                     true

# Disable the OBM-based native exchange (not used in master plan v1).
spark.gluten.sql.columnar.veloxExchange                       false
spark.gluten.sql.columnar.veloxCudfExchange                   false

# ---------------------------------------------------------------------------
# Required for master plan correctness
# ---------------------------------------------------------------------------

# AQE must be disabled — it re-plans between stages, which conflicts with
# the single-plan model.
spark.sql.adaptive.enabled                                    false

# Disable broadcast joins — they create separate Spark stages that feed
# results via ValueStream nodes, which fail in kParallel mode. Force all
# joins through ShuffledHashJoin so they collapse into the single plan.
spark.sql.autoBroadcastJoinThreshold                          -1

# ---------------------------------------------------------------------------
# GPU (cuDF) configuration — uncomment for GPU runs
# ---------------------------------------------------------------------------

# spark.gluten.sql.columnar.cudf                                true
# spark.gluten.sql.columnar.backend.velox.cudf.enableTableScan  true
# spark.gluten.sql.columnar.backend.velox.cudf.memoryResource   arena
# spark.gluten.sql.columnar.backend.velox.cudf.memoryPercent    95
# spark.gluten.sql.columnar.backend.velox.cudf.pinnedPoolSize   8589934592
# spark.gluten.sql.columnar.maxBatchSize                        1048576
# spark.gluten.sql.columnar.cudf.gpuPartition                   true
# spark.gluten.sql.columnar.cudf.convertCpuInput                true
