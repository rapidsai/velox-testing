# GPU-specific Spark configuration for Gluten benchmarks.
# Use with --spark-config to overlay these settings on top of default.conf.

# ---------------------------------------------------------------------------
# Core GPU acceleration
# ---------------------------------------------------------------------------

# Enable cuDF-based GPU acceleration in Velox/Gluten. When true, supported
# Velox PlanNodes are converted to GPU operators backed by RAPIDS cuDF.
# Unsupported operators automatically fall back to CPU execution.
spark.gluten.sql.columnar.cudf                                true

# Run table scans on the GPU via cuDF instead of CPU (Velox). This avoids
# the CPU to GPU data transfer boundary after each scan batch, keeping data
# on-device for the entire query pipeline.
spark.gluten.sql.columnar.backend.velox.cudf.enableTableScan  true

# ---------------------------------------------------------------------------
# GPU shuffle
# ---------------------------------------------------------------------------

# Number of threads used for shuffle data compression. More threads can
# improve shuffle throughput when the GPU generates large intermediate
# datasets that need to be redistributed across partitions.
spark.gluten.sql.columnar.shuffle.compression.threads         8

# Perform shuffle partitioning (hash-mod and data reordering) on the GPU
# instead of transferring data back to the CPU first. This reduces the
# number of device to host memory copies to a single transfer per shuffle.
spark.gluten.sql.columnar.cudf.gpuPartition                   true

# ---------------------------------------------------------------------------
# Debugging (disabled by default)
# ---------------------------------------------------------------------------

# Uncomment to log which operators are replaced by cuDF GPU operators and
# which fall back to CPU.
# spark.gluten.debug.enabled.cudf                             true
